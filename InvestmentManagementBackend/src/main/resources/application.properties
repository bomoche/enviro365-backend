# ── Application ──────────────────────────────────────────
spring.application.name=enviro365-backend

# ── H2 File-Based Database (persistent) ──────────────────
spring.datasource.url=jdbc:h2:file:./data/enviro365db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── H2 Console ───────────────────────────────────────────
# Accessible at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT
jwt.secret=enviro365supersecretkeythatisatleast256bitslong1234567890
jwt.expiration=86400000

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.packagesToScan=com.enviro.assessment.junior
springdoc.swagger-ui.disable-swagger-default-url=true

logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG

# ── Server ───────────────────────────────────────────────
server.port=8080